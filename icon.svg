<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="50%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#92400E" flood-opacity="0.4"/>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#92400E" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <rect x="20" y="20" width="984" height="512" rx="218" fill="url(#shine)"/>

  <g filter="shadow">
    <circle cx="512" cy="480" r="260" fill="url(#coin)" stroke="#D97706" stroke-width="12"/>
    <circle cx="512" cy="480" r="220" fill="none" stroke="#D97706" stroke-width="4" stroke-dasharray="8 12" opacity="0.5"/>
    <circle cx="512" cy="480" r="230" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  </g>

  <g filter="innerShadow">
    <text x="512" y="510" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial" font-size="260" font-weight="800" fill="#D97706" letter-spacing="-10">T</text>
  </g>

  <g opacity="0.9">
    <rect x="310" y="760" width="404" height="28" rx="14" fill="#FEF3C7" opacity="0.3"/>
    <rect x="310" y="760" width="280" height="28" rx="14" fill="#FEF3C7" opacity="0.7"/>
  </g>

  <g opacity="0.6">
    <rect x="360" y="810" width="304" height="20" rx="10" fill="#FEF3C7" opacity="0.3"/>
    <rect x="360" y="810" width="180" height="20" rx="10" fill="#FEF3C7" opacity="0.5"/>
  </g>

  <circle cx="780" cy="250" r="8" fill="#FEF3C7" opacity="0.6"/>
  <circle cx="250" cy="300" r="5" fill="#FEF3C7" opacity="0.4"/>
  <circle cx="720" cy="720" r="6" fill="#FEF3C7" opacity="0.3"/>
</svg>