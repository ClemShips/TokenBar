<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=340">
<style>
:root {
  --bg: #F7F6F3;
  --card-bg: #fff;
  --text: #2D2D2D;
  --muted: #8E8E93;
  --border: #F0EFEC;
  --track: #F0EFEC;
  --tab-bg: #F0EFEC;
  --tab-active: #fff;
  --badge-green-bg: rgba(124,144,112,.13);
  --badge-green: #4A5D43;
  --badge-orange-bg: rgba(212,132,94,.13);
  --badge-orange: #D4845E;
  --badge-red-bg: rgba(200,60,60,.13);
  --badge-red: #c53030;
  --fill-green: #7C9070;
  --fill-orange: #D4845E;
  --fill-red: #c53030;
  --green: #7C9070;
  --tooltip-bg: rgba(0,0,0,0.78);
  --tooltip-text: #fff;
  --shadow: rgba(0,0,0,0.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1C1C1E;
    --card-bg: #2C2C2E;
    --text: #F2F2F7;
    --muted: #98989D;
    --border: #3A3A3C;
    --track: #3A3A3C;
    --tab-bg: #3A3A3C;
    --tab-active: #48484A;
    --badge-green-bg: rgba(124,144,112,.25);
    --badge-green: #8BC07A;
    --badge-orange-bg: rgba(212,132,94,.25);
    --badge-orange: #FF9F5A;
    --badge-red-bg: rgba(200,60,60,.25);
    --badge-red: #FF6B6B;
    --fill-green: #7C9070;
    --fill-orange: #D4845E;
    --fill-red: #c53030;
    --green: #8BC07A;
    --tooltip-bg: rgba(240,240,245,0.9);
    --tooltip-text: #1C1C1E;
    --shadow: rgba(0,0,0,0.18);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
button:focus, button:focus-visible { outline: none; }

body {
  font-family: -apple-system, 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  width: 340px;
  overflow-x: hidden;
  user-select: none;
  transition: background 0.2s ease, color 0.2s ease;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  transition: background 0.2s, border-color 0.2s;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.icon {
  width: 28px; height: 28px;
  background: #7C9070;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.app-title { font-size: 14px; font-weight: 600; color: var(--text); }
.updated { font-size: 11px; color: var(--muted); }

.compact-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.compact-toggle:hover {
  color: var(--text);
  border-color: var(--muted);
}

.content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.8px;
  margin-top: 2px;
}

.card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 2px 8px var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: background 0.2s;
}

.usage-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
  transition: background-color 0.4s ease, color 0.4s ease;
}
.badge-green  { background: var(--badge-green-bg);  color: var(--badge-green); }
.badge-orange { background: var(--badge-orange-bg); color: var(--badge-orange); }
.badge-red    { background: var(--badge-red-bg);    color: var(--badge-red); }

.progress-track {
  height: 6px;
  background: var(--track);
  border-radius: 3px;
  overflow: hidden;
  transition: background 0.2s;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease, background-color 0.4s ease;
  width: 0%;
}
.fill-green  { background-color: var(--fill-green); }
.fill-orange { background-color: var(--fill-orange); }
.fill-red    { background-color: var(--fill-red); }

.reset-time {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  min-height: 14px;
}
.eta-warn {
  font-size: 11px;
  font-weight: 500;
  color: var(--badge-red);
  text-align: right;
}
.day-delta {
  font-size: 10px;
  font-weight: 500;
  margin-left: 4px;
}
.day-delta.up   { color: var(--badge-red); }
.day-delta.down { color: var(--green); }

.divider { height: 1px; background: var(--border); margin: 2px 0; transition: background 0.2s; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.stat-value       { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.1; }
.stat-value.green { color: var(--green); }
.stat-value.sm    { font-size: 16px; }
.stat-label       { font-size: 10px; color: var(--muted); }

.cache-row {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
}
.tab-bar {
  display: flex;
  background: var(--tab-bg);
  border-radius: 8px;
  padding: 3px;
  gap: 0;
  transition: background 0.2s;
}
.tab {
  flex: 1;
  text-align: center;
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  padding: 5px 0;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.tab.active {
  background: var(--tab-active);
  font-weight: 600;
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}

.mini-bar-track {
  display: flex;
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
}
.mini-bar-track div { height: 100%; }

.legend-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  font-size: 9px;
  color: var(--muted);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 1px;
}

.compact-card {
  flex-direction: row !important;
  padding: 12px 16px;
}
.compact-card .stat { flex: 1; }

.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
}
.btn {
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
}
.btn-quit    { font-size: 12px; color: var(--muted); }
.btn-quit:hover { color: var(--text); }
.btn-refresh { font-size: 12px; color: var(--green); font-weight: 500; }
.btn-refresh:hover { opacity: 0.7; }
.spinner { display: none; }
.spinner.spin { display: inline; animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.no-live {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  text-align: center;
  padding: 4px 0;
}

/* About overlay */
.about-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  flex-direction: column;
  padding: 24px 20px 20px;
  gap: 16px;
}
.about-overlay.visible { display: flex; }
.about-title   { font-size: 18px; font-weight: 700; color: var(--text); }
.about-version { font-size: 12px; color: var(--muted); margin-top: 2px; }
.about-row     { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.about-link    { font-size: 12px; color: var(--green); cursor: pointer; text-decoration: none; }
.about-link:hover { opacity: 0.7; }
.about-footer  { display: flex; justify-content: flex-end; margin-top: 8px; }

/* Compact / Detailed toggle */
.view-compact  { display: none; }
.is-compact .view-compact  { display: block; }
.is-compact .view-detailed { display: none; }

.compact-5h-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 2px 8px var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: background 0.2s;
}
.compact-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Tooltips */
[data-tooltip] {
  position: relative;
  cursor: help;
}
[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--tooltip-bg);
  color: var(--tooltip-text);
  font-size: 10px;
  font-weight: 500;
  white-space: nowrap;
  padding: 4px 8px;
  border-radius: 6px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
  z-index: 100;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
[data-tooltip]:hover::after {
  opacity: 1;
}
</style>
</head>
<body style="position:relative">

<div class="about-overlay" id="about-overlay">
  <div>
    <div class="about-title">TokenBar</div>
    <div class="about-version" id="about-version"></div>
  </div>
  <div class="about-row" id="about-oauth"></div>
  <div>
    <a class="about-link" id="about-github-link" onclick="doOpenUrl()">GitHub →</a>
  </div>
  <div class="about-footer">
    <button class="btn btn-refresh" onclick="hideAbout()" id="about-close-btn">Fermer</button>
  </div>
</div>

<div class="header">

    <div class="icon">📊</div>
    <span class="app-title">TokenBar</span>

</div>

<div class="content">

  <!-- VUE COMPACTE -->
  <div class="view-compact">
    <div class="compact-5h-card">
      <div class="compact-row">
        <span style="font-size:12px;font-weight:500;color:var(--text)" data-i18n="lbl_5h">5 dernières heures</span>
        <span class="badge badge-green" id="cpct-pct-5h">—</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill fill-green" id="cpct-bar-5h"></div>
      </div>

      </div>

      <div class="compact-row">
        <span style="font-size:11px;color:var(--muted)" data-i18n="today_compact">Aujourd'hui</span>

  <!-- VUE DÉTAILLÉE -->

    <div class="card" id="live-card">
      <div id="live-content">
        <div class="usage-row">
          <span data-i18n="lbl_5h">5 dernières heures</span>
          <span class="badge badge-green" id="pct-5h">—</span>
        </div>
        <div class="progress-track" style="margin-top:2px">
          <div class="progress-fill fill-green" id="bar-5h"></div>
        </div>
        <div class="reset-time" id="reset-5h"></div>
        <div class="eta-warn" id="eta-5h"></div>

        <div class="usage-row">
          <span data-i18n="lbl_7d">7 derniers jours</span>

        <div class="progress-track" style="margin-top:2px">

    <div class="section-label" data-i18n="sec_month">CE MOIS</div>
    <div class="card compact-card">
      <div class="stat">
        <div class="stat-value sm" id="month-msgs">—</div>
        <div class="stat-label" data-i18n="messages">messages</div>
      </div>
      <div class="stat">
        <div class="stat-value sm" id="month-output">—</div>
        <div class="stat-label" data-i18n="output">output</div>
      </div>
      <div class="stat">
        <div class="stat-value sm green" id="month-cost">—</div>
        <div class="stat-label" data-i18n="cost">coût est.</div>
      </div>
    </div>

    <div class="section-label" data-i18n="sec_history">DEPUIS JAN. 2026</div>
    <div class="card compact-card">
      <div class="stat">
        <div class="stat-value sm" id="hist-msgs">—</div>
        <div class="stat-label" data-i18n="messages">messages</div>
      </div>
      <div class="stat">
        <div class="stat-value sm" id="hist-output">—</div>
        <div class="stat-label" data-i18n="output">output</div>
      </div>
      <div class="stat">
        <div class="stat-value sm green" id="hist-cost">—</div>
        <div class="stat-label" data-i18n="cost">coût est.</div>
      </div>
    </div>

  </div>

  <div class="footer">
    <button class="btn btn-quit" id="btn-quit" onclick="doQuit()">Quitter</button>
    <button class="btn btn-refresh" onclick="doRefresh()" id="refresh-btn">
      <span id="refresh-icon">↺</span> <span id="refresh-text">Actualiser</span>
    </button>
  </div>

</div>

<script>
const STRINGS = {
  fr: {
    updated:          'Mis à jour · ',
    compact:          'Compact',
    detail:           'Détail',
    sec_limits:       "LIMITES D'UTILISATION",
    lbl_5h:           '5 dernières heures',
    lbl_7d:           '7 derniers jours',
    sec_today:        "AUJOURD'HUI",
    messages:         'messages',
    input:            'input',
    output:           'output',
    cost:             'coût est.',
    sec_month:        'CE MOIS',
    sec_history:      'DEPUIS JAN. 2026',
    quit:             'Quitter',
    refresh:          'Actualiser',
    api_unavailable:  'API indisponible',
    expired:          'expiré',
    reset_in:         'reset dans',
    limit_in:         '⚠ limite dans ~',
    eta_short:        '⚠ ~',
    min:              'min',
    all_tab:          'Tous',
    cache_label:      'Cache · ',
    today_compact:    "Aujourd'hui",
    day_suffix:       'j',
    tooltip_messages: "Nombre d'appels API",
    tooltip_input:    'Tokens envoyés à Claude',
    tooltip_output:   'Tokens générés par Claude',
    tooltip_cost:     'Estimation basée sur les tarifs publics',
    tooltip_cache:    'Cache read = 10× moins cher · Cache write ≈ tarif input',
  },
  en: {
    updated:          'Updated · ',
    compact:          'Compact',
    detail:           'Detail',
    sec_limits:       'USAGE LIMITS',
    lbl_5h:           'Last 5 hours',
    lbl_7d:           'Last 7 days',
    sec_today:        'TODAY',
    messages:         'messages',
    input:            'input',
    output:           'output',
    cost:             'est. cost',
    sec_month:        'THIS MONTH',
    sec_history:      'SINCE JAN. 2026',
    quit:             'Quit',
    refresh:          'Refresh',
    api_unavailable:  'API unavailable',
    expired:          'expired',
    reset_in:         'reset in',
    limit_in:         '⚠ limit in ~',
    eta_short:        '⚠ ~',
    min:              'min',
    all_tab:          'All',
    cache_label:      'Cache · ',
    today_compact:    'Today',
    day_suffix:       'd',
    tooltip_messages: 'Number of API calls',
    tooltip_input:    'Tokens sent to Claude',
    tooltip_output:   'Tokens generated by Claude',
    tooltip_cost:     'Estimate based on public pricing',
    tooltip_cache:    'Cache read = 10× cheaper · Cache write ≈ input rate',
  }
};

let _lang = 'fr';
let T = STRINGS.fr;

function applyLang(lang) {
  _lang = lang;
  T = STRINGS[lang] || STRINGS.fr;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = T[el.dataset.i18n] || el.textContent;
  });
  document.querySelectorAll('[data-i18n-tooltip]').forEach(el => {
    const key = el.dataset.i18nTooltip;
    if (T[key]) el.dataset.tooltip = T[key];
  });
  const quitBtn = document.getElementById('btn-quit');
  if (quitBtn) quitBtn.textContent = T.quit;
  const refreshText = document.getElementById('refresh-text');
  if (refreshText) refreshText.textContent = T.refresh;
  const compactBtn = document.getElementById('compact-btn');
  if (compactBtn) compactBtn.textContent = _isCompact ? T.detail : T.compact;
}

function fmtTokens(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return Math.round(n / 1e3) + 'K';
  return String(n);
}

function fmtCost(usd) {
  if (usd >= 1) return '$' + usd.toFixed(2);
  return '$' + usd.toFixed(3);
}

function fmtNum(n) {
  return n.toLocaleString(_lang === 'fr' ? 'fr-FR' : 'en-US');
}

function fmtReset(isoStr) {
  if (!isoStr) return '';
  try {
    const diff = new Date(isoStr) - new Date();
    if (diff <= 0) return T.expired;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const mStr = String(m).padStart(2, '0');
    if (h >= 24) {
      const d = Math.floor(h / 24);
      return `${T.reset_in} ${d}${T.day_suffix} ${h % 24}h${mStr}`;
    }
    return `${T.reset_in} ${h}h${mStr}`;
  } catch (e) { return ''; }
}

function setPct(badgeId, barId, pct) {
  const badge = document.getElementById(badgeId);
  const bar   = document.getElementById(barId);
  badge.textContent = Math.round(pct) + '%';
  bar.style.width   = Math.min(pct, 100) + '%';
  const cls = pct >= 80 ? 'red' : pct >= 50 ? 'orange' : 'green';
  badge.className = 'badge badge-' + cls;
  bar.className   = 'progress-fill fill-' + cls;
}

function set(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

const MODEL_COLORS = {
  'Opus 4.6': '#4A7AB5', 'Opus 4.5': '#4A7AB5',
  'Sonnet 4.6': '#7C9070', 'Sonnet 4.5': '#7C9070',
  'Haiku 4.5': '#D4845E',
};
function modelColor(name) { return MODEL_COLORS[name] || '#8E8E93'; }

let _lastData   = null;
let _activeTab  = 'all';
let _isCompact  = false;

const COMPACT_H = 252;
const DETAIL_H  = 590;
const ABOUT_H   = 210;

function applyCompact(compact) {
  _isCompact = compact;
  document.body.classList.toggle('is-compact', compact);
  document.getElementById('compact-btn').textContent = compact ? T.detail : T.compact;
  window.webkit.messageHandlers.action.postMessage({
    type: 'resize',
    height: compact ? COMPACT_H : DETAIL_H
  });
}

function toggleCompact() {
  const next = !_isCompact;
  localStorage.setItem('compact_mode', next ? '1' : '0');
  applyCompact(next);
  if (_lastData && next) updateCompactView(_lastData);
}

function updateCompactView(data) {
  const fh  = (data.live || {}).five_hour || {};
  const pct = fh.utilization || 0;
  setPct('cpct-pct-5h', 'cpct-bar-5h', pct);
  set('cpct-reset-5h', fmtReset(fh.resets_at));
  const etaEl = document.getElementById('cpct-eta-5h');
  if (data.eta_min != null) {
    const h = Math.floor(data.eta_min / 60);
    const m = data.eta_min % 60;
    etaEl.textContent = T.eta_short + (h > 0 ? h + 'h' + String(m).padStart(2,'0') : m + ' ' + T.min);
  } else {
    etaEl.textContent = '';
  }
  set('cpct-cost', fmtCost((data.today || {}).cost || 0));
}

function showTodayStats(src) {
  set('today-msgs',   fmtNum(src.messages || 0));
  set('today-input',  fmtTokens(src.input  || 0));
  set('today-output', fmtTokens(src.output || 0));
  set('today-cost',   fmtCost(src.cost     || 0));
  const cache = (src.cache_read || 0) + (src.cache_create || 0);
  set('today-cache', cache > 0 ? T.cache_label + fmtTokens(cache) : '');
}

function buildModelUI(t) {
  const models  = t.by_model || {};
  const sorted  = Object.entries(models).sort((a, b) => b[1].output - a[1].output);
  const totalOut = t.output || 1;

  const tabBar = document.getElementById('model-tabs');
  const bar    = document.getElementById('model-bar');
  const legend = document.getElementById('model-legend');

  if (sorted.length === 0) {
    tabBar.innerHTML = bar.innerHTML = legend.innerHTML = '';
    return;
  }

  tabBar.innerHTML = '<button class="tab' + (_activeTab === 'all' ? ' active' : '') + '" data-model="all">' + T.all_tab + '</button>' +
    sorted.map(([m]) => '<button class="tab' + (_activeTab === m ? ' active' : '') + '" data-model="' + m + '">' + m.split(' ')[0] + '</button>').join('');

  tabBar.querySelectorAll('.tab').forEach(btn => {
    btn.onclick = function() {
      _activeTab = this.dataset.model;
      tabBar.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      if (_activeTab === 'all') {
        showTodayStats(t);
        bar.style.display = legend.style.display = '';
      } else {
        showTodayStats(models[_activeTab] || {messages:0,input:0,output:0,cost:0,cache_read:0,cache_create:0});
        bar.style.display = legend.style.display = 'none';
      }
    };
  });

  bar.style.display = legend.style.display = '';
  bar.innerHTML = sorted.map(([m, s]) => {
    const pct = Math.max((s.output / totalOut) * 100, 1);
    return '<div style="width:' + pct + '%;background:' + modelColor(m) + '"></div>';
  }).join('');
  legend.innerHTML = sorted.map(([m, s]) => {
    const pct = Math.round((s.output / totalOut) * 100);
    return '<span class="legend-item"><span class="legend-dot" style="background:' + modelColor(m) + '"></span>' + m.split(' ')[0] + ' ' + pct + '%</span>';
  }).join('');
}

window.updateData = function(data) {
  _lastData = data;
  const now = new Date();
  if (data.lang) applyLang(data.lang);

  set('updated', T.updated +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0'));

  if (data.live) {
    const fh = data.live.five_hour || {};
    const sd = data.live.seven_day || {};
    setPct('pct-5h', 'bar-5h', fh.utilization || 0);
    set('reset-5h', fmtReset(fh.resets_at));
    setPct('pct-7d', 'bar-7d', sd.utilization || 0);
    set('reset-7d', fmtReset(sd.resets_at));
    document.getElementById('live-content').style.opacity = '1';
  } else {
    set('pct-5h', '—'); set('reset-5h', T.api_unavailable);
    set('pct-7d', '—'); set('reset-7d', T.api_unavailable);
    document.getElementById('live-content').style.opacity = '0.5';
  }

  const etaEl = document.getElementById('eta-5h');
  if (data.eta_min != null) {
    const h = Math.floor(data.eta_min / 60);
    const m = data.eta_min % 60;
    etaEl.textContent = T.limit_in + (h > 0 ? h + 'h' + String(m).padStart(2,'0') : m + ' ' + T.min);
  } else {
    etaEl.textContent = '';
  }

  const deltaEl = document.getElementById('day-delta');
  if (data.day_delta != null) {
    const sign = data.day_delta >= 0 ? '+' : '';
    deltaEl.textContent = sign + data.day_delta + '%';
    deltaEl.className = 'day-delta ' + (data.day_delta >= 0 ? 'up' : 'down');
  } else {
    deltaEl.textContent = '';
  }

  const t = data.today || {};
  if (_activeTab === 'all') {
    showTodayStats(t);
  } else {
    showTodayStats((t.by_model || {})[_activeTab] || {messages:0,input:0,output:0,cost:0,cache_read:0,cache_create:0});
  }
  buildModelUI(t);

  const mo = data.month || {};
  set('month-msgs',   fmtNum(mo.messages || 0));
  set('month-output', fmtTokens(mo.output || 0));
  set('month-cost',   fmtCost(mo.cost    || 0));

  const h = data.history || {};
  set('hist-msgs',   fmtNum(h.msgs    || 0));
  set('hist-output', fmtTokens(h.out  || 0));
  set('hist-cost',   fmtCost(h.cost   || 0));

  if (_isCompact) updateCompactView(data);
};

function doQuit() {
  window.webkit.messageHandlers.action.postMessage({ type: 'quit' });
}
function doRefresh() {
  window.webkit.messageHandlers.action.postMessage({ type: 'refresh' });
}

let _aboutGithubUrl = '';
window.showAbout = function(data) {
  const lang = data.lang || _lang;
  const isFr = lang === 'fr';
  document.getElementById('about-version').textContent = 'v' + data.version;
  document.getElementById('about-oauth').textContent =
    (isFr ? 'OAuth : ' : 'OAuth: ') + (data.oauth_ok ? 'Connecté ✓' : 'Token expiré ✗');
  _aboutGithubUrl = data.github_url || '';
  document.getElementById('about-close-btn').textContent = isFr ? 'Fermer' : 'Close';
  document.getElementById('about-overlay').classList.add('visible');
  window.webkit.messageHandlers.action.postMessage({ type: 'resize', height: ABOUT_H });
};
function hideAbout() {
  document.getElementById('about-overlay').classList.remove('visible');
  const h = _isCompact ? COMPACT_H : DETAIL_H;
  window.webkit.messageHandlers.action.postMessage({ type: 'resize', height: h });
}
function doOpenUrl() {
  window.webkit.messageHandlers.action.postMessage({ type: 'open_url', url: _aboutGithubUrl });
}

document.addEventListener('DOMContentLoaded', function() {
  if (localStorage.getItem('compact_mode') === '1') {
    applyCompact(true);
  }
});
</script>
